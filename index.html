  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"><\u002Fpath><path d=\"M7 7h10v10\"><\u002Fpath><\u002Fsvg>{{ k.delta }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:18px 16px; box-shadow:0 4px 14px -10px rgba(19,54,107,.3);\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;\">\n            <h3 style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; color:var(--ink); margin:0;\">Usage mensuel<\u002Fh3>\n            <span style=\"font-size:11px; color:var(--body); opacity:.7; font-weight:600;\">6 derniers mois<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-end; gap:10px; height:130px;\">\n            <sc-for list=\"{{ usageBars }}\" as=\"u\" hint-placeholder-count=\"6\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;\">\n                <div style=\"width:100%; height:{{ u.h }}%; background:{{ u.bg }}; border-radius:6px 6px 0 0; transition:height .5s cubic-bezier(.2,.7,.3,1);\"><\u002Fdiv>\n                <span style=\"font-size:10.5px; color:var(--body); font-weight:600;\">{{ u.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <span style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; color:var(--ink);\">Alertes récentes<\u002Fspan>\n          <sc-for list=\"{{ adminAlerts }}\" as=\"a\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; gap:12px; background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:11px 14px;\">\n              <div style=\"flex:none; width:8px; height:8px; border-radius:50%; background:{{ a.color }};\"><\u002Fdiv>\n              <span style=\"flex:1; font-size:12.5px; font-weight:700; color:var(--ink);\">{{ a.text }}<\u002Fspan>\n              <span style=\"flex:none; font-size:11px; color:var(--muted); font-weight:600;\">{{ a.time }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- bottom nav -->\n  <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:none; display:grid; grid-template-columns:repeat(4,1fr); border-top:1.5px solid var(--line); background:var(--bg); padding:10px 8px 22px;\">\n    <div onclick=\"{{ goAccueil }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:color .2s ease, transform .12s ease; color:{{ navAccueil }};\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m3 10 9-7 9 7v10a1.8 1.8 0 0 1-1.8 1.8H4.8A1.8 1.8 0 0 1 3 20V10z\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:10.5px;\">Accueil<\u002Fspan>\n    <\u002Fdiv>\n    <div onclick=\"{{ goCollection }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:color .2s ease, transform .12s ease; color:{{ navCollection }};\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"2\"><\u002Frect><\u002Fsvg>\n      <span style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:10.5px;\">Collection<\u002Fspan>\n    <\u002Fdiv>\n    <div onclick=\"{{ goPokedex }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:color .2s ease, transform .12s ease; color:{{ navPokedex }};\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h6\"><\u002Fpath><path d=\"M15 12h6\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n      <span style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:10.5px;\">Pokédex<\u002Fspan>\n    <\u002Fdiv>\n    <div onclick=\"{{ goProfil }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:color .2s ease, transform .12s ease; color:{{ navProfil }};\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:10.5px;\">Profil<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;darkMode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Apparence&quot;},&quot;pokedexPct&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:78,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:1,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Données&quot;},&quot;streakDays&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:7,&quot;min&quot;:0,&quot;max&quot;:365,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Données&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'landing', prev: 'accueil', dark: null, splash: true,\n    prefs: { notifs: true, sons: false, sauvegarde: true },\n    obStep: 0, premium: false, adminMode: false,\n    dexQuery: '',\n    notifs: [\n      { title: 'Bonus de carte débloqué', desc: 'Ton Pikachu spécial t\\u2019attend', time: '2 min', initial: 'B', iconBg: '#FFCB05', unread: true },\n      { title: 'Proposition d\\u2019échange', desc: 'Léa propose un échange', time: '1 h', initial: 'L', iconBg: '#2A75BB', unread: true },\n      { title: 'Objectif accompli', desc: 'Échanger avec un dresseur ✓', time: 'Hier', initial: 'O', iconBg: '#5FA85C', unread: false },\n      { title: 'Événement cross-jeux', desc: 'Nouvelles récompenses Pokémon GO', time: 'Hier', initial: 'É', iconBg: '#13366B', unread: false },\n    ],\n    tradeTrainer: null, tradeNum: null, tradeDone: false,\n    detailNum: 25, fav: { 25: true },\n    filter: 'Tous', box: 0,\n    sel: { 4: true, 7: true, 25: true }, transferDone: false, doneCount: 0,\n    goals: [\n      { title: 'Transférer 5 Pokémon', cur: 3, max: 5 },\n      { title: 'Compléter une page du Pokédex', cur: 8, max: 10 },\n      { title: 'Échanger avec un dresseur', cur: 1, max: 1 },\n    ],\n    plan: 'annuel',\n  };\n\n  componentDidMount() {\n    try {\n      const t = localStorage.getItem('pkhome-theme');\n      if (t) this.setState({ dark: t === 'dark' });\n    } catch (e) {}\n    this._splashTimer = setTimeout(() => this.setState({ splash: false }), 2400);\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._splashTimer);\n  }\n\n  componentDidUpdate(prevProps) {\n    const pd = !!(this.props.darkMode ?? false);\n    const prevPd = !!((prevProps ? prevProps.darkMode : undefined) ?? false);\n    if (pd !== prevPd && (this.state.dark ?? prevPd) !== pd) {\n      this.setState({ dark: pd });\n      try { localStorage.setItem('pkhome-theme', pd ? 'dark' : 'light'); } catch (e) {}\n    }\n    const dark = this.state.dark ?? pd;\n    if (this._desk) this._desk.setAttribute('data-pk-theme', dark ? 'dark' : 'light');\n  }\n\n  all() {\n    if (this._all) return this._all;\n    const raw = [\n      [1,'Bulbizarre','Plante','Poison'],[2,'Herbizarre','Plante','Poison'],[3,'Florizarre','Plante','Poison'],\n      [4,'Salamèche','Feu',''],[5,'Reptincel','Feu',''],[6,'Dracaufeu','Feu','Vol'],\n      [7,'Carapuce','Eau',''],[8,'Carabaffe','Eau',''],[9,'Tortank','Eau',''],\n      [10,'Chenipan','Insecte',''],[11,'Chrysacier','Insecte',''],[12,'Papilusion','Insecte','Vol'],\n      [13,'Aspicot','Insecte','Poison'],[14,'Coconfort','Insecte','Poison'],[15,'Dardargnan','Insecte','Poison'],\n      [16,'Roucool','Normal','Vol'],[17,'Roucoups','Normal','Vol'],[18,'Roucarnage','Normal','Vol'],\n      [19,'Rattata','Normal',''],[20,'Rattatac','Normal',''],[21,'Piafabec','Normal','Vol'],\n      [22,'Rapasdepic','Normal','Vol'],[23,'Abo','Poison',''],[24,'Arbok','Poison',''],\n      [25,'Pikachu','Électrik',''],[26,'Raichu','Électrik',''],[27,'Sabelette','Sol',''],\n      [28,'Sablaireau','Sol',''],[29,'Nidoran F','Poison',''],[30,'Nidorina','Poison',''],\n      [31,'Nidoqueen','Poison','Sol'],[32,'Nidoran M','Poison',''],[33,'Nidorino','Poison',''],\n      [34,'Nidoking','Poison','Sol'],[35,'Mélofée','Fée',''],[36,'Mélodelfe','Fée',''],\n      [37,'Goupix','Feu',''],[38,'Feunard','Feu',''],[39,'Rondoudou','Normal','Fée'],\n      [40,'Grodoudou','Normal','Fée'],[41,'Nosferapti','Poison','Vol'],[42,'Nosferalto','Poison','Vol'],\n      [43,'Mystherbe','Plante','Poison'],[44,'Ortide','Plante','Poison'],[45,'Rafflesia','Plante','Poison'],\n      [46,'Paras','Insecte','Plante'],[47,'Parasect','Insecte','Plante'],[48,'Mimitoss','Insecte','Poison'],\n      [49,'Aéromite','Insecte','Poison'],[50,'Taupiqueur','Sol',''],[51,'Triopikeur','Sol',''],\n      [52,'Miaouss','Normal',''],[53,'Persian','Normal',''],[54,'Psykokwak','Eau',''],\n      [55,'Akwakwak','Eau',''],[56,'Férosinge','Combat',''],[57,'Colossinge','Combat',''],\n      [58,'Caninos','Feu',''],[59,'Arcanin','Feu',''],[60,'Ptitard','Eau',''],\n      [144,'Artikodin','Glace','Vol'],[145,'Électhor','Électrik','Vol'],[146,'Sulfura','Feu','Vol'],[150,'Mewtwo','Psy',''],\n    ];\n    const shiny = new Set([6, 25, 39, 45, 59]);\n    const missing = new Set([13, 21, 29, 32, 47, 50, 56, 150]);\n    this._all = raw.map((r) => ({\n      num: r[0], name: r[1], t1: r[2], t2: r[3],\n      shiny: shiny.has(r[0]), legendary: r[0] >= 144, owned: !missing.has(r[0]),\n    }));\n    return this._all;\n  }\n\n  typeColor(t) {\n    const m = { Plante: '#5FA85C', Poison: '#9A5EA8', Feu: '#E07B39', Eau: '#4A90D9', Insecte: '#9BB13A', Vol: '#8FA8DD', Normal: '#9A9DA1', 'Électrik': '#D9A92C', Sol: '#C9A15A', 'Fée': '#DE8FB8', Combat: '#C4574A', Psy: '#DE6E8A', Glace: '#5FB8B0' };\n    return m[t] || '#9A9DA1';\n  }\n\n  go(screen) { this.setState((s) => ({ prev: s.screen, screen })); }\n  pad(n) { return 'N° ' + String(n).padStart(3, '0'); }\n\n  renderVals() {\n    const s = this.state;\n    const all = this.all();\n    const owned = all.filter((p) => p.owned);\n    const BLUE = '#2A75BB', DARK = '#13366B', GRAY = '#8A97A8', YELLOW = '#FFCB05';\n    const dark = s.dark ?? !!(this.props.darkMode ?? false);\n    const T = dark\n      ? { sub: '#1D2C49', card: '#182742', line: '#24365A', track: '#26395C', ink: '#EAF0F9', body: '#AFBDD3', muted: '#7486A3', tint: '#20335A', faint: '#14203A', ghost: '#41567F', dot: '#3E5C8F' }\n      : { sub: '#EEF2F7', card: '#fff', line: '#EEF2F7', track: '#DCE4EE', ink: '#13366B', body: '#3A4756', muted: '#8A97A8', tint: '#F2F7FC', faint: '#F7F9FC', ghost: '#C4CEDA', dot: '#9FC3E4' };\n\n    // navigation\n    const nav = {};\n    ['Accueil', 'Collection', 'Pokedex', 'Profil'].forEach((t) => {\n      nav['go' + t] = () => this.go(t.toLowerCase());\n      nav['nav' + t] = s.screen === t.toLowerCase() ? (dark ? '#7FB2E0' : BLUE) : T.muted;\n    });\n    nav.goTransfert = () => this.go('transfert');\n    nav.goOnboarding = () => this.setState({ screen: 'onboarding', obStep: 0 });\n    nav.goBonus = () => this.go('bonus');\n    nav.goNotifs = () => this.go('notifs');\n    nav.goEchange = () => this.go('echange');\n    nav.goObjectifs = () => this.go('objectifs');\n    nav.goPremium = () => this.go('premium');\n    nav.goSucces = () => this.go('succes');\n    nav.goReglages = () => this.go('reglages');\n    nav.goAdmin = () => this.go('admin');\n    nav.goBack = () => this.setState({ screen: s.prev || 'accueil' });\n\n    // collection\n    const FILTERS = ['Tous', 'Brillants', 'Légendaires', 'Par région'];\n    const chips = FILTERS.map((f) => ({\n      label: f,\n      bg: s.filter === f ? BLUE : T.sub,\n      fg: s.filter === f ? '#fff' : T.body,\n      onClick: () => this.setState({ filter: f, box: 0 }),\n    }));\n    let pool = owned;\n    if (s.filter === 'Brillants') pool = owned.filter((p) => p.shiny);\n    if (s.filter === 'Légendaires') pool = owned.filter((p) => p.legendary);\n    const PER = 16;\n    const nBoxes = Math.max(1, Math.ceil(pool.length / PER));\n    const box = Math.min(s.box, nBoxes - 1);\n    const gridList = pool.slice(box * PER, box * PER + PER).map((p) => ({\n      num3: this.pad(p.num), name: p.name,\n      border: p.shiny ? YELLOW : 'transparent', shiny: p.shiny,\n      onClick: () => this.setState((st) => ({ prev: st.screen, screen: 'fiche', detailNum: p.num })),\n    }));\n    const boxes = Array.from({ length: nBoxes }, (_, i) => ({\n      label: 'Boîte ' + (i + 1),\n      bg: i === box ? (dark ? BLUE : DARK) : T.sub,\n      fg: i === box ? '#fff' : T.body,\n      onClick: () => this.setState({ box: i }),\n    }));\n\n    // fiche\n    const d = all.find((p) => p.num === s.detailNum) || all[0];\n    const st = (mult, base) => base + ((d.num * mult) % 70);\n    const stats = [\n      { label: 'PV', val: st(13, 45), color: '#5FA85C' },\n      { label: 'Attaque', val: st(17, 40), color: '#C4574A' },\n      { label: 'Défense', val: st(11, 40), color: BLUE },\n      { label: 'Vitesse', val: st(19, 35), color: YELLOW },\n    ].map((x) => ({ ...x, pct: Math.min(100, Math.round(x.val / 1.2)) }));\n    const MOVES = ['Charge', 'Vive-Attaque', 'Queue de Fer', 'Abri', 'Tonnerre', 'Hydrocanon', 'Lance-Soleil', 'Danse-Lames'];\n    const detailMoves = [0, 1, 2, 3].map((i) => ({ name: MOVES[(d.num + i * 3) % MOVES.length] }));\n    const isFav = !!s.fav[d.num];\n\n    // transfert\n    const candidates = all.slice(0, 12);\n    const transferList = candidates.map((p) => {\n      const on = !!s.sel[p.num];\n      return {\n        num3: this.pad(p.num), name: p.name,\n        border: on ? BLUE : 'transparent',\n        checkBg: on ? YELLOW : T.track,\n        mark: on ? '✓' : '',\n        onClick: () => this.setState((prev) => ({ sel: { ...prev.sel, [p.num]: !prev.sel[p.num] } })),\n      };\n    });\n    const selCount = Object.values(s.sel).filter(Boolean).length;\n\n    // objectifs\n    const mkGoal = (g, i) => {\n      const done = g.cur >= g.max;\n      return {\n        title: g.title,\n        progress: g.cur + '/' + g.max,\n        pct: Math.round((g.cur / g.max) * 100),\n        mark: done ? '✓' : '',\n        boxBg: done ? BLUE : T.track,\n        barColor: done ? '#5FA85C' : BLUE,\n        onClick: () => this.setState((prev) => {\n          const goals = prev.goals.map((x, j) => j === i ? { ...x, cur: x.cur >= x.max ? 0 : Math.min(x.max, x.cur + 1) } : x);\n          return { goals };\n        }),\n      };\n    };\n    const goalsFull = s.goals.map(mkGoal);\n\n    // pokédex\n    const regions = [\n      { name: 'Kanto', pct: 78 }, { name: 'Johto', pct: 61 }, { name: 'Hoenn', pct: 47 },\n      { name: 'Sinnoh', pct: 34 }, { name: 'Galar', pct: 18 },\n    ];\n    const q = (s.dexQuery || '').trim().toLowerCase();\n    const dexPool = q\n      ? all.filter((p) => p.name.toLowerCase()
